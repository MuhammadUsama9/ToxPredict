apiVersion: apps/v1
kind: Deployment
metadata:
  name: qsar-frontend
  labels:
    app: qsar-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qsar-frontend
  template:
    metadata:
      labels:
        app: qsar-frontend
    spec:
      containers:
      - name: frontend
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: frontend-volume
          mountPath: /usr/share/nginx/html
          readOnly: true
        - name: nginx-conf-volume
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
          readOnly: true
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: frontend-volume
        hostPath:
          path: /absolute/path/to/your/project/frontend # UPDATE THIS PATH
          type: Directory
      - name: nginx-conf-volume
        hostPath:
          path: /absolute/path/to/your/project/nginx.conf # UPDATE THIS PATH
          type: FileOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: qsar-frontend
spec:
  selector:
    app: qsar-frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 80
  type: NodePort
  #