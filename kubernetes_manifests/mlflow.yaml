apiVersion: apps/v1
kind: Deployment
metadata:
  name: qsar-mlflow
  labels:
    app: qsar-mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qsar-mlflow
  template:
    metadata:
      labels:
        app: qsar-mlflow
    spec:
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.11.0
        ports:
        - containerPort: 5000
        command:
        - sh
        - -c
        - "mlflow server --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root /mlflow/artifacts --host 0.0.0.0 --port 5000"
        volumeMounts:
        - name: mlflow-data
          mountPath: /mlflow
        readinessProbe:
          exec:
            command:
            - "python3"
            - "-c"
            - "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: mlflow-data
        persistentVolumeClaim:
          claimName: mlflow-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: qsar-mlflow
spec:
  selector:
    app: qsar-mlflow
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
